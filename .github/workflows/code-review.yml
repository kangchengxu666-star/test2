name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: "claude-sonnet-4-6"
          ANTHROPIC_DEFAULT_SONNET_MODEL: "claude-sonnet-4-6"
          ANTHROPIC_DEFAULT_HAIKU_MODEL: "claude-haiku-4-5"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
          CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING: "1"
          MAX_THINKING_TOKENS: "64000"
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: "128000"
        with:
          track_progress: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(git log:*),Bash(git show:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            You are a code reviewer. Review this pull request for logic bugs,
            unhandled exceptions, and missing tests. Be concise.
